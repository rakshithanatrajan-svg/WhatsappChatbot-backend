# ══════════════════════════════════════════════
#   WhatsApp Chatbot — Application Configuration
# ══════════════════════════════════════════════

spring.application.name=whatsapp-chatbot

# Server
server.port=${PORT:8080}
server.servlet.context-path=/

# Pretty-print JSON responses
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
# Actuator (for health checks — useful on Render)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# App Info (shown in /actuator/info)
info.app.name=WhatsApp Chatbot Simulation
info.app.version=1.0.0
info.app.description=A Spring Boot REST API simulating a WhatsApp chatbot backend
info.app.author=WhatsBot Team

# Logging
logging.level.com.chatbot=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/chatbot.log
